[project]
name = "kastel-research-scout"
version = "0.1.0"
description = "Criteria-driven research paper scouting for Kastel Stack"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
]

[tool.setuptools.packages.find]
include = ["research_scout*"]

[tool.pytest.ini_options]
pythonpath = ["."]
addopts = ["-p", "no:cacheprovider"]
